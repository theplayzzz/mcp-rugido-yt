# Compose pra desenvolvimento local. No Dokploy, configure o app + service Postgres
# pela UI; este arquivo serve só pra dev local e como referência da topologia.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rugido
      POSTGRES_PASSWORD: rugido_dev
      POSTGRES_DB: mcp_rugido_yt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rugido -d mcp_rugido_yt"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://rugido:rugido_dev@db:5432/mcp_rugido_yt
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-http://localhost:8000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FERNET_KEY: ${FERNET_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      DAILY_QUOTA_LIMIT: ${DAILY_QUOTA_LIMIT:-10000}
    ports:
      - "8000:8000"

volumes:
  pgdata:
